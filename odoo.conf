[options]
; ============================================================
; Odoo Configuration File
; Place this file at ./config/odoo.conf
; ============================================================

; --- Database ---
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_password

; --- Server ---
http_port = 8069
longpolling_port = 8072

; --- Paths ---
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; --- Security ---
; Set a strong master password to protect the database manager
admin_passwd = CHANGE_ME_STRONG_MASTER_PASSWORD

; --- Performance ---
workers = 2
max_cron_threads = 1

; --- Logging ---
logfile = /var/log/odoo/odoo.log
log_level = info
